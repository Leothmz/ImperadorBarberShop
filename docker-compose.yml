services:
  postgres:
    image: postgres:16-alpine
    container_name: imperador_barber_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: imperador_barber
      POSTGRES_USER: imperador
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imperador -d imperador_barber"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
